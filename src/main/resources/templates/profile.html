<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/home}">BusTicket</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/search-trip}">Tìm chuyến</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ticket/search}">Tra cứu vé</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/myTicket}">Vé của tôi</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="profile-title">Thông tin cá nhân</h2>
        <p class="text-muted">Cập nhật thông tin tài khoản của bạn</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <form method="post" action="/profile/update">

                        <input type="hidden" name="userId" th:value="${user.id}"/>

                        <div class="form-group">
                            <label>Họ và tên</label>
                            <input class="form-control"
                                   name="fullName"
                                   th:value="${user.profile?.fullName}"
                                   placeholder="Nhập họ tên">
                        </div>

                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input class="form-control"
                                   name="phone"
                                   th:value="${user.profile?.phone}"
                                   placeholder="Nhập số điện thoại">
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input class="form-control"
                                   name="email"
                                   th:value="${user.profile?.email}"
                                   placeholder="Nhập email">
                        </div>

                        <div class="form-group">
                            <label>Địa chỉ</label>
                            <input class="form-control"
                                   name="address"
                                   th:value="${user.profile?.address}"
                                   placeholder="Nhập địa chỉ">
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/home}" class="btn btn-outline-secondary">
                                ← Quay lại
                            </a>

                            <button type="submit" class="btn btn-primary">
                                Cập nhật
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
