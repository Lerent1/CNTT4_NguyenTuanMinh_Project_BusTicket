<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Danh sách vé chờ thanh toán</h3>

        <a th:href="@{/home}" class="btn btn-outline-secondary">
            ← Quay lại
        </a>
    </div>

    <!-- THÔNG BÁO NẾU KHÔNG CÓ VÉ -->
    <div th:if="${tickets == null || #lists.isEmpty(tickets)}"
         class="alert alert-info text-center">

        Không có vé đang chờ xử lý.

    </div>

    <!-- DANH SÁCH VÉ -->
    <div th:if="${tickets != null && !#lists.isEmpty(tickets)}">

        <table class="table table-bordered table-hover">

            <thead class="thead-dark">
            <tr>
                <th>Mã vé</th>
                <th>Khách hàng</th>
                <th>SĐT</th>
                <th>Chuyến</th>
                <th>Ghế</th>
                <th>Giá</th>
                <th>Trạng thái</th>
                <th width="180">Hành động</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="ticket : ${tickets}">

                <td th:text="${ticket.code}"></td>

                <td th:text="${ticket.customerName}"></td>

                <td th:text="${ticket.phone}"></td>

                <td>
                    <span th:text="${ticket.trip.route.departure.name}"></span>
                    →
                    <span th:text="${ticket.trip.route.destination.name}"></span>
                </td>

                <td th:text="${ticket.seat.seatNumber}"></td>

                <td th:text="${ticket.totalPrice}"></td>

                <td>
                    <span class="badge badge-warning">
                        PENDING
                    </span>
                </td>

                <td class="text-center">

                    <!-- XÁC NHẬN -->
                    <form th:action="@{'/admin/tickets/confirm/' + ${ticket.id}}"
                          method="post"
                          style="display:inline;">

                        <button class="btn btn-success btn-sm">
                            Xác nhận
                        </button>

                    </form>

                    <!-- HỦY -->
                    <form th:action="@{'/admin/tickets/cancel/' + ${ticket.id}}"
                          method="post"
                          style="display:inline;">

                        <button class="btn btn-danger btn-sm">
                            Hủy
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
