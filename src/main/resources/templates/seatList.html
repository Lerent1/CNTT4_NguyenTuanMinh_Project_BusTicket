<!doctype html>
<html lang="en">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/home}">BusTicket</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/search-trip}">Tìm chuyến</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/ticket/search}">Tra cứu vé</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/myTicket}">Vé của tôi</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">

    <!-- HEADER -->
    <div class="top-box">
        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h3 class="font-weight-bold mb-1">
                    <i class="fa-solid fa-bus text-primary mr-2"></i>
                    Sơ đồ ghế
                </h3>

                <div class="text-muted" th:if="${trip}">
                    <i class="fa-solid fa-location-dot text-danger"></i>
                    <span th:text="${trip.route.departure.name}"></span>
                    →
                    <span th:text="${trip.route.destination.name}"></span>

                    <br>

                    <i class="fa-solid fa-calendar text-primary mt-1"></i>
                    <span th:text="${#temporals.format(trip.departureTime,'dd/MM/yyyy HH:mm')}"></span>
                </div>
            </div>

            <a th:href="@{/search-trip}" class="btn btn-outline-secondary">
                ← Quay lại
            </a>

        </div>
    </div>

    <!-- EMPTY -->
    <div th:if="${seats == null || #lists.isEmpty(seats)}"
         class="alert alert-warning text-center shadow-sm">
        Không có ghế cho chuyến này
    </div>

    <!-- SEATS -->
    <div th:if="${seats != null && !#lists.isEmpty(seats)}">

        <div class="row">

            <div class="col-lg-2 col-md-3 col-6 mb-4"
                 th:each="seat : ${seats}">

                <!-- AVAILABLE -->
                <div th:if="${seat.status.name() == 'AVAILABLE'}"
                     class="card seat-card border-success text-center p-3">

                    <div class="seat-icon available">
                        <i class="fa-solid fa-chair"></i>
                    </div>

                    <div class="seat-number" th:text="${seat.seatNumber}"></div>

                    <span class="badge badge-success mt-2">Trống</span>

                    <form method="post"
                          th:action="@{'/seats/hold/' + ${seat.id}}">

                        <input type="hidden" name="tripId" th:value="${tripId}">

                        <button class="btn btn-success btn-sm btn-block mt-3">
                            Chọn
                        </button>

                    </form>

                </div>

                <!-- PENDING -->
                <div th:if="${seat.status.name() == 'PENDING'}"
                     class="card seat-card border-warning text-center p-3">

                    <div class="seat-icon pending">
                        <i class="fa-solid fa-clock"></i>
                    </div>

                    <div class="seat-number" th:text="${seat.seatNumber}"></div>

                    <span class="badge badge-warning text-white mt-2">Đang giữ</span>

                    <form method="post" th:action="@{/book-ticket}">

                        <input type="hidden" name="seatId" th:value="${seat.id}">

                        <input class="form-control form-control-sm mt-2"
                               name="customerName"
                               placeholder="Họ tên" required>

                        <input class="form-control form-control-sm mt-2"
                               name="phone"
                               placeholder="SĐT" required>

                        <input type="email"
                               class="form-control form-control-sm mt-2"
                               name="email"
                               placeholder="Email"
                               required>

                        <button class="btn btn-warning btn-sm btn-block mt-2 text-white">
                            Đặt vé
                        </button>

                    </form>

                </div>

                <!-- BOOKED -->
                <div th:if="${seat.status.name() == 'BOOKED'}"
                     class="card seat-card border-danger text-center p-3">

                    <div class="seat-icon booked">
                        <i class="fa-solid fa-ban"></i>
                    </div>

                    <div class="seat-number" th:text="${seat.seatNumber}"></div>

                    <span class="badge badge-danger mt-2">Đã đặt</span>

                    <button class="btn btn-danger btn-sm btn-block mt-3" disabled>
                        Full
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
