<!doctype html>
<html lang="en">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/home}">BusTicket</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/search-trip}">Tìm chuyến</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ticket/search}">Tra cứu vé</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/myTicket}">Vé của tôi</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow-lg ticket-card">

                <!-- HEADER -->
                <div class="ticket-header">

                    <h4>
                        <i class="fa-solid fa-ticket mr-2"></i>
                        Thông tin vé
                    </h4>

                </div>

                <!-- BODY -->
                <div class="ticket-body">

                    <div class="row">

                        <!-- MÃ VÉ -->
                        <div class="col-md-6 mb-4">

                            <label>Mã vé</label>

                            <input class="form-control"
                                   th:value="${ticket.code}"
                                   readonly>

                        </div>

                        <!-- KHÁCH HÀNG -->
                        <div class="col-md-6 mb-4">

                            <label>Khách hàng</label>

                            <input class="form-control"
                                   th:value="${ticket.customerName}"
                                   readonly>

                        </div>

                        <!-- PHONE -->
                        <div class="col-md-6 mb-4">

                            <label>Số điện thoại</label>

                            <input class="form-control"
                                   th:value="${ticket.phone}"
                                   readonly>

                        </div>

                        <!-- EMAIL -->
                        <div class="col-md-6 mb-4">

                            <label>Email</label>

                            <input class="form-control"
                                   th:value="${ticket.email}"
                                   readonly>

                        </div>

                        <!-- GHẾ -->
                        <div class="col-md-6 mb-4">

                            <label>Ghế</label>

                            <input class="form-control"
                                   th:value="${ticket.seat.seatNumber}"
                                   readonly>

                        </div>

                        <!-- TRẠNG THÁI -->
                        <div class="col-md-6 mb-4">

                            <label>Trạng thái</label>

                            <input class="form-control"
                                   th:value="${ticket.status}"
                                   readonly>

                        </div>

                        <!-- ĐIỂM ĐI -->
                        <div class="col-md-6 mb-4">

                            <label>Điểm đi</label>

                            <input class="form-control"
                                   th:value="${ticket.trip.route.departure.name}"
                                   readonly>

                        </div>

                        <!-- ĐIỂM ĐẾN -->
                        <div class="col-md-6 mb-4">

                            <label>Điểm đến</label>

                            <input class="form-control"
                                   th:value="${ticket.trip.route.destination.name}"
                                   readonly>

                        </div>

                        <!-- GIỜ KHỞI HÀNH -->
                        <div class="col-md-6 mb-4">

                            <label>Ngày khởi hành</label>

                            <input class="form-control"
                                   th:value="${ticket.trip.departureTime}"
                                   readonly>

                        </div>

                        <!-- GIÁ -->
                        <div class="col-md-6 mb-4">

                            <label>Giá vé</label>

                            <input class="form-control text-success font-weight-bold"
                                   th:value="${ticket.totalPrice}"
                                   readonly>

                        </div>

                    </div>

                    <!-- BUTTON -->
                    <div class="mt-4 d-flex">

                        <a th:href="@{/home}" class="btn btn-outline-secondary">
                            ← Quay lại
                        </a>

                        <form th:if="${ticket.status.name() != 'CANCELLED'}"
                              th:action="@{'/cancel/' + ${ticket.id}}"
                              method="post"
                              class="ml-2">

                            <button class="btn btn-danger btn-custom"
                                    onclick="return confirm('Bạn có chắc muốn hủy vé?')">

                                <i class="fa-solid fa-xmark mr-2"></i>
                                Hủy vé

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
