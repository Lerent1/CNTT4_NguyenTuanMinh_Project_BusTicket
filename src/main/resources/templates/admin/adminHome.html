<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/admin}">
            BusTicket Admin
        </a>

        <a th:href="@{/auth/logout}" class="btn btn-outline-secondary">Đăng xuất</a>
    </div>
</nav>

<div class="container py-5">

    <div class="text-center mb-5">
        <h2 class="font-weight-bold">Trang Quản Ly</h2>
        <p class="text-muted">Chọn chức năng bạn muốn quản lý</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm admin-card h-100">
                <div class="card-body text-center p-4">

                    <div class="icon-style text-danger">
                        <i class="fas fa-bus"></i>
                    </div>

                    <h4 class="font-weight-bold">Quản Lý Xe</h4>

                    <p class="text-muted">
                        Quản lý danh sách xe, thêm, sửa, xóa.
                    </p>

                    <a th:href="@{/admin/buses}"
                       class="btn btn-danger btn-lg btn-block">
                        Vào quản lý
                    </a>

                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card shadow-sm admin-card h-100">
                <div class="card-body text-center p-4">

                    <div class="icon-style text-success">
                        <i class="fas fa-user-tie"></i>
                    </div>

                    <h4 class="font-weight-bold">Quản Lý Nhân Viên</h4>

                    <p class="text-muted">
                        Thêm, sửa, xóa nhân viên hệ thống.
                    </p>

                    <a th:href="@{/admin/addEmployee}"
                       class="btn btn-success btn-lg btn-block">
                        Vào quản lý
                    </a>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
