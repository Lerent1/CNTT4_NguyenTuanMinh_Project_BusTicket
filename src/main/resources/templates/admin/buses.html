<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/admin}">
            BusTicket Admin
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title mb-0">
             Bus Management
        </h2>

        <div>
            <a th:href="@{/admin}"
               class="btn btn-secondary">
                Quay lại
            </a>

            <a th:href="@{/admin/buses/add}"
               class="btn btn-primary">
                + Add New Bus
            </a>
        </div>

    </div>

    <div class="card shadow-sm card-table">

        <div class="card-body p-0">

            <table class="table table-hover mb-0">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Plate</th>
                    <th>Type</th>
                    <th>Seats</th>
                    <th class="text-center">Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="bus : ${buses}">
                    <td th:text="${bus.id}"></td>
                    <td class="font-weight-bold"
                        th:text="${bus.licensePlate}"></td>
                    <td th:text="${bus.busType}"></td>
                    <td th:text="${bus.totalSeats}"></td>

                    <td class="text-center">

                        <a th:href="@{'/admin/buses/edit/' + ${bus.id}}"
                           class="btn btn-warning btn-sm mr-1">
                            Edit
                        </a>

                        <a th:href="@{'/admin/buses/delete/' + ${bus.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa?')">
                            Delete
                        </a>

                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
