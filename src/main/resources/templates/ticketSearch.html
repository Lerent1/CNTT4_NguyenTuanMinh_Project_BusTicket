<!doctype html>
<html lang="en">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/home}">BusTicket</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/search-trip}">Tìm chuyến</a></li>
                <li class="nav-item active"><a class="nav-link" th:href="@{/ticket/search}">Tra cứu vé</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/myTicket}">Vé của tôi</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <!-- SEARCH -->
    <div class="card shadow search-card">
        <div class="card-body p-4">

            <div class="d-flex align-items-center mb-4">

                <div class="icon-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <div class="ml-3">
                    <h4 class="mb-1 font-weight-bold">Tra cứu vé</h4>
                    <small class="text-muted">Nhập mã vé và số điện thoại để xem thông tin</small>
                </div>

            </div>

            <!-- ERROR -->
            <div th:if="${error}" class="alert alert-danger">
                <i class="fa-solid fa-circle-exclamation mr-2"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- FORM -->
            <form method="get" action="/ticket/search">

                <div class="row">

                    <div class="col-md-6 mb-2">
                        <label>Mã vé</label>
                        <input type="text" name="code"
                               class="form-control form-control-lg"
                               placeholder="VD: TK12345"
                               required>
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>Số điện thoại</label>
                        <input type="text" name="phone"
                               class="form-control form-control-lg"
                               placeholder="VD: 09xxxxxxx"
                               required>
                    </div>

                </div>

                <div class="mt-3">
                    <button class="btn btn-info">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i>
                        Tra cứu
                    </button>

                    <a th:href="@{/home}" class="btn btn-secondary">
                        Quay lại
                    </a>
                </div>

            </form>

        </div>
    </div>

    <!-- RESULT -->
    <div th:if="${ticket != null}" class="card shadow mt-4 ticket-card">

        <div class="card-header bg-success text-white">
            <i class="fa-solid fa-ticket mr-2"></i>
            Thông tin vé
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Mã vé</label>
                    <input class="form-control" th:value="${ticket.code}" readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Khách hàng</label>
                    <input class="form-control" th:value="${ticket.customerName}" readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Số điện thoại</label>
                    <input class="form-control" th:value="${ticket.phone}" readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Ghế</label>
                    <input class="form-control" th:value="${ticket.seat.seatNumber}" readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Trạng thái</label>
                    <input class="form-control" th:value="${ticket.status}" readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Điểm đi</label>
                    <input class="form-control" th:value="${ticket.seat.trip.route.departure.name}"
                           readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Điểm đến</label>
                    <input class="form-control" th:value="${ticket.seat.trip.route.destination.name}"
                           readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Ngày khởi hành</label>
                    <input class="form-control" th:value="${ticket.seat.trip.departureTime}" readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Giá vé</label>
                    <input class="form-control" th:value="${ticket.seat.trip.price}" readonly>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
